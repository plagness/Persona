id: tools
title:
  en: "Tools & Infrastructure"
  ru: "Инструменты и инфраструктура"
category: tools
weight: 50

rules:
  - id: lang.fit
    title:
      en: "Low-level for critical, anything for prototypes"
      ru: "Низкоуровневое для критичного, что угодно для прототипов"
    body:
      en: |
        Go/Rust/Metal for performance-critical code. Python for prototypes and ETL.
        TypeScript for web. The language fits the task, not the other way around.
        No dogma — pragmatic choice every time.
      ru: |
        Go/Rust/Metal для критичного по производительности кода. Python для прототипов и ETL.
        TypeScript для веба. Язык подбирается под задачу, а не наоборот.
        Никакой догмы — прагматичный выбор каждый раз.
    severity: should
    tags: [languages, backend, performance]
    since: "2024-01"

  - id: deps.practical
    title:
      en: "Take what you need, skip junk"
      ru: "Бери нужное, пропускай мусор"
    body:
      en: |
        Freely add libraries for real tasks. No utility belts (lodash, moment)
        when native APIs suffice. Every dependency should solve a concrete problem,
        not be insurance against hypothetical needs.
      ru: |
        Свободно добавлять библиотеки для реальных задач. Никаких утилитарных
        комбайнов (lodash, moment), когда хватает нативных API. Каждая зависимость
        должна решать конкретную задачу, а не быть страховкой на всякий случай.
    severity: should
    tags: [dependencies, code, frontend, backend]
    since: "2026-01"

  - id: smart.hosting
    title:
      en: "Managed services, minimize raw VDS"
      ru: "Управляемые сервисы, минимум голых VDS"
    body:
      en: |
        Mix Cloudflare and managed DB strategically. The host is responsible
        for DB reliability and uptime. Don't dump everything on a raw VDS —
        use managed services where they make sense.
      ru: |
        Стратегически комбинировать Cloudflare и управляемые БД. Хостер отвечает
        за надёжность и аптайм БД. Не сваливать всё на голый VDS —
        использовать управляемые сервисы там, где это разумно.
    severity: must
    tags: [infra, hosting, cost, backend]
    since: "2026-01"
