id: privacy
title:
  en: "Privacy"
  ru: "Приватность"
category: privacy
weight: 70

rules:
  - id: show.personality
    icon: eye
    title:
      en: "Show personality, blur raw data"
      ru: "Показывать личность, размывать сырые данные"
    body:
      en: |
        Core principle: don't publish what can harm, show personality through
        blurred data. Movies and games are open. Search queries become topic clusters.
        GPS rounded to 2 decimals. Health reduced to a score.
        The goal is to reveal who you are, not what you did minute by minute.
      ru: |
        Основной принцип: не публиковать то, что может навредить, показывать
        личность через размытые данные. Фильмы и игры открыты. Поисковые запросы
        становятся topic clusters. GPS округлён до 2 знаков. Здоровье — только оценка.
        Цель — показать кто ты, а не что делал поминутно.
    severity: must
    tags: [privacy, data, api, philosophy]
    since: "2025-01"

  - id: secrets.separate
    icon: lock
    title:
      en: "Secrets in .env, never in git"
      ru: "Секреты в .env, никогда в git"
    body:
      en: |
        All secrets, API keys, and database passwords live in `.env`.
        The `.env` file is always in `.gitignore`. Never commit credentials.
        Cloudflare secrets via `wrangler secret put`.
      ru: |
        Все секреты, API ключи и пароли баз живут в `.env`.
        Файл `.env` всегда в `.gitignore`. Никогда не коммитить креденшелы.
        Секреты Cloudflare через `wrangler secret put`.
    severity: must
    tags: [security, git, infra]
    since: "2024-01"

  - id: masking.flags
    icon: database
    title:
      en: "DB masking: is_private, is_censored"
      ru: "Маскирование в БД: is_private, is_censored"
    body:
      en: |
        Records can be marked with `is_private` or `is_censored` flags.
        Masking functions replace sensitive fields with labels before API response.
        This is the database-level privacy layer — applied in route handlers.
      ru: |
        Записи могут быть помечены флагами `is_private` или `is_censored`.
        Функции маскирования заменяют чувствительные поля метками перед ответом API.
        Это слой приватности на уровне базы — применяется в обработчиках роутов.
    severity: must
    tags: [privacy, database, api, backend]
    since: "2026-02"

  - id: hidden.data
    icon: eye-off
    title:
      en: "Fully hidden: biometrics, finances, precise location"
      ru: "Полностью скрыто: биометрия, финансы, точная геолокация"
    body:
      en: |
        Some data categories are never exposed in any form: biometric measurements,
        financial transactions, precise GPS coordinates, raw health data.
        These are not blurred or aggregated — they simply don't exist in the public layer.
      ru: |
        Некоторые категории данных никогда не публикуются ни в каком виде: биометрия,
        финансовые транзакции, точные GPS координаты, сырые данные здоровья.
        Они не размываются и не агрегируются — их просто нет в публичном слое.
    severity: must
    tags: [privacy, data, security]
    since: "2025-01"
