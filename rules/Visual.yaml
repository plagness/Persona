id: visual
title:
  en: "Visual Style"
  ru: "Визуальный стиль"
category: visual
weight: 30

rules:
  - id: dark.or.light
    icon: moon
    title:
      en: "Dark if dark — fully black"
      ru: "Тёмная тема — значит полностью чёрная"
    body:
      en: |
        Personal site (plag.space): OLED black, no compromises.
        Other projects can be light if the case demands it (module.cast).
        The key is to commit to the choice fully — no half-measures.
      ru: |
        Личный сайт (plag.space): OLED чёрный, без компромиссов.
        Другие проекты могут быть светлыми, если того требует кейс (module.cast).
        Главное — полностью следовать выбору, без полумер.
    severity: must
    tags: [design, ux, frontend, theme]
    since: "2026-01"

  - id: accent.plag
    icon: palette
    title:
      en: "Per-page accent (plag.space)"
      ru: "Акцент-цвет для каждой страницы (plag.space)"
    body:
      en: |
        Each page section on plag.space has its own unique accent color.
        This is specific to plag.space, not a universal rule.
        Accent is used in gradients, borders, glows, and badges.
      ru: |
        Каждая секция plag.space имеет свой уникальный акцент-цвет.
        Это правило специфично для plag.space, а не универсально.
        Акцент используется в градиентах, рамках, свечениях и бейджах.
    severity: should
    tags: [design, colors, frontend]
    since: "2026-01"

  - id: liquid.glass
    icon: droplets
    title:
      en: "Liquid Glass — the new standard"
      ru: "Liquid Glass — новый стандарт"
    body:
      en: |
        Apple Liquid Glass (2025): optical distortions, volumetric interfaces.
        The transition from flat glass to refractive, dynamic, alive surfaces.
        This is the new direction for interface design.
      ru: |
        Apple Liquid Glass (2025): оптические искажения, объёмные интерфейсы.
        Переход от плоского стекла к преломляющим, динамичным, живым поверхностям.
        Это новое направление в дизайне интерфейсов.
    severity: should
    tags: [design, ux, frontend, trend]
    since: "2026-02"

  - id: subtle.motion
    icon: sparkles
    title:
      en: "Subtle animations, never distracting"
      ru: "Тонкие анимации, никогда не отвлекающие"
    body:
      en: |
        Animations serve the user, not the designer. Subtle scale shifts,
        gentle fades, spring physics. If the user notices the animation
        before the content, it's too much.
      ru: |
        Анимации служат пользователю, а не дизайнеру. Лёгкие сдвиги масштаба,
        плавные затухания, пружинная физика. Если пользователь замечает
        анимацию раньше контента — это перебор.
    severity: should
    tags: [animation, ux, frontend, performance]
    since: "2026-02"
