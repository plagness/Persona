id: naming
title:
  en: "Naming Conventions"
  ru: "Конвенции именования"
category: naming
weight: 10

rules:
  - id: clean.names
    title:
      en: "Clean names without separators"
      ru: "Чистые имена без разделителей"
    body:
      en: |
        Avoid `-` and `_` everywhere. PascalCase for files, camelCase for variables,
        dots for configs. Snake_case only where the language demands it
        (Python modules, SQL legacy columns).
        Examples: `ProjectCard.tsx`, `apiClient.ts`, `Game.Rules.yaml`.
      ru: |
        Избегать `-` и `_` повсюду. PascalCase для файлов, camelCase для переменных,
        точки для конфигов. Snake_case только там, где требует язык
        (модули Python, legacy-колонки SQL).
        Примеры: `ProjectCard.tsx`, `apiClient.ts`, `Game.Rules.yaml`.
    severity: must
    tags: [naming, code, frontend, backend]
    since: "2025-06"

  - id: short.names
    title:
      en: "Short, laconic names"
      ru: "Короткие, лаконичные имена"
    body:
      en: |
        Prefer short names and explain context elsewhere. `api.ts` not
        `apiClientWrapper.ts`. If the name needs a comment to explain,
        the structure is wrong, not the name.
      ru: |
        Предпочитать короткие имена, контекст объяснять в другом месте.
        `api.ts`, а не `apiClientWrapper.ts`. Если имя требует комментария —
        проблема в структуре, а не в имени.
    severity: should
    tags: [naming, code, readability]
    since: "2025-01"

  - id: versioning
    title:
      en: "Version: Year.Month.Day.Rev"
      ru: "Версии: Год.Месяц.День.Ревизия"
    body:
      en: |
        Version numbers follow `[Year].[Month].[Day].[Revision]`.
        Example: `26.4.1.1` means April 1, 2026, revision 1.
        No semver for personal projects — date-based versioning gives
        chronological context in every version number.
      ru: |
        Версии следуют формату `[Год].[Месяц].[День].[Ревизия]`.
        Пример: `26.4.1.1` — 1 апреля 2026, ревизия 1.
        Никакого semver для личных проектов — версия по дате
        даёт хронологический контекст в каждом номере.
    severity: must
    tags: [versioning, workflow, git]
    since: "2026-01"
