id: workflow
title:
  en: "Workflow"
  ru: "Рабочий процесс"
category: workflow
weight: 40

rules:
  - id: commit.prefixes
    title:
      en: "Commit prefixes: fix, feat, refactor, redesign, seo, audit"
      ru: "Префиксы коммитов: fix, feat, refactor, redesign, seo, audit"
    body:
      en: |
        Every commit message starts with a type prefix:
        `fix:` bug fix, `feat:` new feature, `refactor:` code restructure,
        `redesign:` visual overhaul, `seo:` search optimization, `audit:` review.
        English only, concise (8-80 chars).
      ru: |
        Каждый коммит начинается с префикса типа:
        `fix:` баг, `feat:` фича, `refactor:` рефактор,
        `redesign:` визуальный редизайн, `seo:` SEO, `audit:` аудит.
        Только на английском, кратко (8-80 символов).
    severity: must
    tags: [git, commits, style]
    since: "2026-02"

  - id: active.pushing
    title:
      en: "Push frequently — preserve history"
      ru: "Частый пуш — сохранение истории"
    body:
      en: |
        Push almost every meaningful action to git. This preserves full history
        and enables fast rollback. Many small commits are better than one large one.
        History is the most valuable part of a repository.
      ru: |
        Пушить почти каждое значимое действие в гит. Это сохраняет полную историю
        и позволяет быстрый откат. Много маленьких коммитов лучше одного большого.
        История — самая ценная часть репозитория.
    severity: must
    tags: [git, workflow, history]
    since: "2024-01"

  - id: github.projects.board
    title:
      en: "GitHub Projects as task board by departments"
      ru: "GitHub Projects как доска задач по департаментам"
    body:
      en: |
        Use GitHub Projects for task management. Boards are organized
        by departments/domains. Issues link to branches and PRs.
        No external task trackers needed.
      ru: |
        GitHub Projects для управления задачами. Доски организованы
        по департаментам/доменам. Issue привязаны к веткам и PR.
        Внешние трекеры задач не нужны.
    severity: should
    tags: [github, tasks, organization]
    since: "2026-02"

  - id: branch.strategy
    title:
      en: "main for development, release for production"
      ru: "main для разработки, release для продакшена"
    body:
      en: |
        `main` — active development, all commits go here first.
        `release` — stable production, merged periodically from main.
        No feature branches for solo work. Linear history preferred.
      ru: |
        `main` — активная разработка, все коммиты сначала сюда.
        `release` — стабильный продакшен, мёрж из main периодически.
        Без feature-веток для соло-работы. Линейная история предпочтительна.
    severity: must
    tags: [git, branches, workflow]
    since: "2026-02"

  - id: manual.deploy
    title:
      en: "Manual deploy via wrangler CLI"
      ru: "Ручной деплой через wrangler CLI"
    body:
      en: |
        No auto-deploy configured. All deployments are manual:
        `wrangler pages deploy dist --project-name=space --branch=release`
        Always verify `--project-name` before deploying.
      ru: |
        Автодеплой не настроен. Все деплои ручные:
        `wrangler pages deploy dist --project-name=space --branch=release`
        Всегда проверять `--project-name` перед деплоем.
    severity: must
    tags: [deploy, cloudflare, safety]
    since: "2026-03"

  - id: etl.pipeline
    title:
      en: "ETL pipeline: KS → PostgreSQL → D1"
      ru: "ETL пайплайн: KS → PostgreSQL → D1"
    body:
      en: |
        Data flows through three stages:
        1. `python3 scripts/etl.py` — KS → PostgreSQL (22 extractors, ~9s)
        2. `bash scripts/dump.sh --push` — PostgreSQL → VDS backup
        3. `python3 scripts/exportD1.py` — PostgreSQL → D1 SQL export
      ru: |
        Данные проходят три этапа:
        1. `python3 scripts/etl.py` — KS → PostgreSQL (22 экстрактора, ~9с)
        2. `bash scripts/dump.sh --push` — PostgreSQL → VDS бекап
        3. `python3 scripts/exportD1.py` — PostgreSQL → D1 SQL экспорт
    severity: must
    tags: [etl, data, pipeline]
    since: "2026-03"
