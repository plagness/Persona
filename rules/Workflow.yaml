id: workflow
title:
  en: "Workflow"
  ru: "Рабочий процесс"
category: workflow
weight: 40

rules:
  - id: push.often
    title:
      en: "Push frequently — history is gold"
      ru: "Частый пуш — история бесценна"
    body:
      en: |
        Push almost every meaningful action to git. This preserves full history
        and enables fast rollback. Many small commits are better than one large one.
        History is the most valuable part of a repository.
      ru: |
        Пушить почти каждое значимое действие в гит. Это сохраняет полную историю
        и позволяет быстрый откат. Много маленьких коммитов лучше одного большого.
        История — самая ценная часть репозитория.
    severity: must
    tags: [git, workflow, backend, frontend]
    since: "2024-01"

  - id: commit.style
    title:
      en: "Conventional commits: fix, feat, refactor"
      ru: "Конвенциональные коммиты: fix, feat, refactor"
    body:
      en: |
        Every commit message starts with a type prefix:
        `fix:` bug fix, `feat:` new feature, `refactor:` code restructure,
        `redesign:` visual overhaul, `seo:` search optimization, `audit:` review.
        English only, concise.
      ru: |
        Каждый коммит начинается с префикса типа:
        `fix:` баг, `feat:` фича, `refactor:` рефактор,
        `redesign:` визуальный редизайн, `seo:` SEO, `audit:` аудит.
        Только на английском, кратко.
    severity: must
    tags: [git, workflow, code]
    since: "2026-02"

  - id: tagging
    title:
      en: "Tag everything, balance proportions"
      ru: "Тегировать всё, балансируя пропорции"
    body:
      en: |
        More tags are better than fewer. Use multiple tag types: general, zones,
        themes. Not too broad (useless), not too granular (noise).
        Tags are the primary way to find and connect things.
      ru: |
        Больше тегов лучше, чем меньше. Разные типы: общие, зоны, темы.
        Не слишком широко (бесполезно), не слишком мелко (шум).
        Теги — основной способ находить и связывать вещи.
    severity: should
    tags: [workflow, organization, data]
    since: "2026-04"

  - id: github.boards
    title:
      en: "GitHub Projects as task board"
      ru: "GitHub Projects как доска задач"
    body:
      en: |
        Use GitHub Projects for task management. Boards organized
        by departments and domains. Issues link to branches and PRs.
        No external task trackers needed.
      ru: |
        GitHub Projects для управления задачами. Доски организованы
        по департаментам и доменам. Issue привязаны к веткам и PR.
        Внешние трекеры задач не нужны.
    severity: should
    tags: [workflow, git, organization]
    since: "2026-02"

  - id: manual.deploy
    title:
      en: "Manual deploy, always verify"
      ru: "Ручной деплой, всегда проверять"
    body:
      en: |
        All deployments are manual and require verification before execution.
        Always check `--project-name` and target environment.
        Incident: accidentally deployed wrong project (2026-03-28).
      ru: |
        Все деплои ручные и требуют проверки перед выполнением.
        Всегда проверять `--project-name` и целевое окружение.
        Инцидент: случайно задеплоил не тот проект (2026-03-28).
    severity: must
    tags: [deploy, safety, infra]
    since: "2026-03"
