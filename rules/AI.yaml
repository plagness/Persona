id: ai
title:
  en: "AI Integration"
  ru: "Интеграция с ИИ"
category: ai
weight: 80

rules:
  - id: russian.english
    title:
      en: "Russian talk, English code"
      ru: "Общение на русском, код на английском"
    body:
      en: |
        All human communication happens in Russian.
        All code, commit messages, API keys, and technical docs are in English.
        UI supports bilingual (ru/en) via i18n system.
      ru: |
        Всё общение с человеком на русском.
        Весь код, коммиты, API ключи и техническая документация на английском.
        UI поддерживает двуязычность (ru/en) через систему i18n.
    severity: must
    tags: [communication, code, workflow]
    since: "2026-01"

  - id: persona.source
    title:
      en: "Persona repo = source of truth for agents"
      ru: "Репо Persona = источник истины для агентов"
    body:
      en: |
        Agents query `/v1/persona` for rules and context. The Persona repo
        is the versioned manifest — the single source of truth.
        API data provides dynamic context, Persona provides identity.
      ru: |
        Агенты запрашивают `/v1/persona` для правил и контекста. Репо Persona —
        это версионированный манифест, единственный источник истины.
        API даёт динамический контекст, Persona даёт идентичность.
    severity: must
    tags: [ai, api, workflow, data]
    since: "2026-04"

  - id: no.deploy.without
    title:
      en: "Never deploy without approval"
      ru: "Никогда не деплоить без подтверждения"
    body:
      en: |
        Deployment to production requires explicit user approval.
        Always show what will be deployed and wait for confirmation.
        Local development and testing need no approval.
      ru: |
        Деплой в продакшен требует явного подтверждения пользователя.
        Всегда показать, что будет задеплоено, и дождаться подтверждения.
        Локальная разработка и тестирование не требуют подтверждения.
    severity: must
    tags: [safety, deploy, workflow]
    since: "2026-03"

  - id: quality.first
    title:
      en: "Quality > speed, fit the task"
      ru: "Качество > скорость, соответствовать задаче"
    body:
      en: |
        Prefer correct, minimal solutions over fast, complex ones.
        Don't add features beyond what was asked. Don't add abstractions
        for hypothetical future needs. Fit the solution to the task at hand.
      ru: |
        Предпочитать корректные, минимальные решения быстрым и сложным.
        Не добавлять фичи сверх запрошенного. Не создавать абстракции
        для гипотетических нужд. Решение должно соответствовать задаче.
    severity: must
    tags: [philosophy, code, quality]
    since: "2024-01"
