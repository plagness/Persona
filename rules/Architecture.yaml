id: architecture
title:
  en: "Architecture"
  ru: "Архитектура"
category: architecture
weight: 20

rules:
  - id: microservices
    icon: boxes
    title:
      en: "Micro/nano services, no monoliths"
      ru: "Микро/наносервисы, никаких монолитов"
    body:
      en: |
        Every service does one thing. Split by domain into containers,
        orchestrate with K3s clusters. A monolith is a last resort,
        not a starting point.
      ru: |
        Каждый сервис делает одно дело. Разделение по доменам в контейнеры,
        оркестрация через K3s кластеры. Монолит — крайняя мера,
        не начальная точка.
    severity: must
    tags: [architecture, containers, infra, backend]
    since: "2024-01"

  - id: config.over.hardcode
    icon: settings
    title:
      en: "Config over hardcode"
      ru: "Конфиг вместо хардкода"
    body:
      en: |
        Everything configurable goes into config files, environment variables,
        or manifest YAML. Avoid changing code to change behavior.
        `wrangler.toml`, `.env`, `persona.yaml` — not inline strings.
      ru: |
        Всё настраиваемое — в конфиг файлы, переменные окружения
        или манифесты YAML. Не менять код, чтобы изменить поведение.
        `wrangler.toml`, `.env`, `persona.yaml` — не строки в коде.
    severity: must
    tags: [architecture, config, backend, infra]
    since: "2024-06"

  - id: arm.uma
    icon: cpu
    title:
      en: "ARM + UMA is the future"
      ru: "ARM + UMA — это будущее"
    body:
      en: |
        ARM won the consumer market. UMA (Unified Memory Architecture) is ideal
        for everyday computing. Apple Silicon showed the path.
        ARM will dominate robotics too. Build and test on ARM first.
      ru: |
        ARM выиграл потребительский рынок. UMA (Unified Memory Architecture)
        идеальна для повседневных вычислений. Apple Silicon показал путь.
        ARM будет доминировать и в робототехнике. Собирать и тестировать под ARM.
    severity: should
    tags: [hardware, arm, performance, infra]
    since: "2024-01"

  - id: domain.symmetry
    icon: proportions
    title:
      en: "Domain-centric file symmetry"
      ru: "Доменно-центричная симметрия файлов"
    body:
      en: |
        Frontend page, API route, and ETL extractor share the same domain name.
        `pages/Gaming.tsx` ↔ `routes/games.ts` ↔ `extractors/games.py`.
        Finding code means knowing the domain.
      ru: |
        Страница фронтенда, роут API и ETL экстрактор делят одно имя домена.
        `pages/Gaming.tsx` ↔ `routes/games.ts` ↔ `extractors/games.py`.
        Найти код = знать домен.
    severity: should
    tags: [architecture, code, frontend, backend]
    since: "2026-01"

  - id: cicd
    icon: circle-play
    status: desired
    title:
      en: "CI/CD via GitHub Actions"
      ru: "CI/CD через GitHub Actions"
    body:
      en: |
        Automated testing on push: build, types, lint.
        Gradually add e2e tests and deploy previews.
        CI catches regressions before they reach production.
      ru: |
        Автоматическое тестирование при пуше: сборка, типы, линтер.
        Постепенно добавлять e2e тесты и превью деплоев.
        CI ловит регрессии до того, как они дойдут до продакшена.
    severity: should
    tags: [workflow, git, testing, infra]
    since: "2026-04"
